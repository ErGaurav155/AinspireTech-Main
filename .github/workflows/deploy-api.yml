name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "turbo.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx turbo run type-check --filter=api

      - name: Build
        run: npx turbo run build --filter=api

      # Railway auto-deploys from main branch if connected to GitHub
      # The railway.toml handles the actual Railway deploy config
